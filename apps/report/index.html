<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>ai-usage report</title>
    <script>
      // Apply a pinned theme before first paint so there is no flash of the
      // wrong scheme; with no pin the page follows the OS through CSS alone.
      try {
        var theme = localStorage.getItem('ai-usage-theme');
        if (theme === 'light' || theme === 'dark') {
          document.documentElement.dataset.theme = theme;
          document.querySelector('meta[name="color-scheme"]').setAttribute('content', theme);
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
